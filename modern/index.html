<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>OrderSprinter Modern</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <section class="login-screen" id="login-screen">
      <div class="login-card">
        <h1>Login</h1>
        <label>
          <span>Benutzer-ID</span>
          <input type="number" id="login-user" inputmode="numeric" />
        </label>
        <label>
          <span>Passwort</span>
          <input type="password" id="login-pass" readonly inputmode="none" autocomplete="off" />
        </label>
        <div class="keyboard">
          <div class="keyboard-row" id="kbd-row-1"></div>
          <div class="keyboard-row" id="kbd-row-2"></div>
          <div class="keyboard-row" id="kbd-row-3"></div>
          <div class="keyboard-row" id="kbd-row-4"></div>
        </div>
        <div class="login-actions">
          <button class="primary" id="login-btn">Login</button>
          <button class="ghost" id="login-clear">Löschen</button>
        </div>
        <div class="login-hint" id="login-hint"></div>
      </div>
    </section>

    <section class="app-screen hidden" id="start-screen">
      <div class="order-layout">
        <div class="order-left">
          <div class="order-top">
            <div class="order-top-row">
              <div class="order-menu">
                <div class="order-menu-left">
                  <button class="menu-btn" data-action="to-go">To Go</button>
                  <button class="menu-btn" data-action="paydesk">Kasse</button>
                </div>
                <button class="menu-btn menu-btn-right" data-action="menu">Menü</button>
              </div>
            </div>
          </div>
          <div class="order-bottom">
            <div id="tables-grid" class="tables-grid"></div>
          </div>
        </div>
        <div class="order-right" id="start-right">
          <div class="status-item">Kellner: <span id="status-user">-</span></div>
          <div class="status-item">Broker: <span id="status-broker">-</span></div>
          <div class="status-item">Online: <span id="status-online">-</span></div>
          <div class="status-item">Sync: <span id="status-sync">-</span></div>
          <div class="status-item">Printer: <span id="status-printer">-</span></div>
          <div class="status-item">TSE: <span id="status-tse">-</span></div>
        </div>
      </div>
    </section>

    <section class="app-screen hidden" id="order-screen">
      <div class="order-layout">
        <div class="order-left">
          <div class="order-top">
            <div class="order-top-row">
              <div class="order-title"><span id="order-table-label">Tisch</span></div>
              <div class="order-menu">
                <div class="order-menu-left">
                  <button class="menu-btn" data-action="start">Start</button>
                  <button class="menu-btn" data-action="paydesk">Kasse</button>
                  <button class="menu-btn" data-action="workprint">Arbeitsbon</button>
                  <button class="menu-btn" data-action="send">Bestellen</button>
                  <button class="menu-btn" data-action="changetable">Tisch wechseln</button>
                </div>
                <button class="menu-btn menu-btn-right" data-action="menu">Menü</button>
              </div>
            </div>
            <div class="order-info" id="order-info-bar">
              <span>Kellner: <b id="order-user">-</b></span>
              <span>Broker: <b id="order-broker">-</b></span>
              <span>Online: <b id="order-online">-</b></span>
              <span>Sync: <b id="order-sync">-</b></span>
              <span>Printer: <b id="order-printer">-</b></span>
              <span>TSE: <b id="order-tse">-</b></span>
            </div>
          </div>
          <div class="order-bottom">
            <div class="category-row" id="category-row"></div>
            <div class="products-grid" id="products-grid"></div>
          </div>
        </div>
        <div class="order-right" id="order-right">
          <div id="order-items"></div>
        </div>
      </div>
    </section>

    <section class="app-screen hidden" id="paydesk-screen">
      <div class="paydesk-layout">
        <div class="paydesk-main">
          <div class="paydesk-top">
            <div class="order-menu">
              <div class="order-menu-left">
                <button class="menu-btn" data-action="start">Start</button>
              </div>
            </div>
          </div>
          <div class="paydesk-bottom">
            <div class="paydesk-columns">
              <div class="paydesk-col">
                <div class="paydesk-col-head">
                  <span>Nicht bezahlt</span>
                  <button class="ghost" id="paydesk-add-all">+alles</button>
                </div>
                <div id="paydesk-open"></div>
              </div>
              <div class="paydesk-col">
                <div class="paydesk-col-head">
                  <span>Bon</span>
                  <div class="paydesk-col-actions">
                    <span>Summe: <b id="paydesk-total">0.00</b></span>
                    <button class="ghost" id="paydesk-clear-receipt">-alles</button>
                  </div>
                </div>
                <div id="paydesk-receipt"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="paydesk-side">
          <div class="paydesk-side-top" id="paydesk-table-label">Tisch</div>
          <div class="paydesk-side-actions">
            <button class="toggle-btn" id="paydesk-host">Bewirtungsbeleg</button>
            <button class="toggle-btn" id="paydesk-print">Bon drucken</button>
          </div>
          <div class="paydesk-side-payments" id="paydesk-payments"></div>
        </div>
      </div>
    </section>

    <div class="modal hidden" id="product-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Produkt</h2>
          <button class="ghost" id="modal-close">Schließen</button>
        </div>
        <div class="modal-body">
          <div class="modal-row">
            <label>Menge</label>
            <input type="number" id="modal-qty" value="1" min="1" step="1" />
          </div>
          <div class="modal-row">
            <label>Bemerkung</label>
            <input type="text" id="modal-note" placeholder="z. B. ohne Zwiebeln" />
          </div>
          <div class="modal-row">
            <label class="toggle">
              <input type="checkbox" id="modal-togo" />
              <span>To-Go</span>
            </label>
          </div>
          <div class="modal-extras">
            <div class="section-title">Extras</div>
            <div id="modal-extras"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="primary" id="modal-add">Zum Warenkorb</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="confirm-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="confirm-title">Bestellung offen</h2>
        </div>
        <div class="modal-body" id="confirm-body"></div>
        <div class="modal-footer" id="confirm-actions"></div>
      </div>
    </div>

    <div class="modal hidden" id="menu-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Menü</h2>
          <button class="ghost" id="menu-close">Schließen</button>
        </div>
        <div class="modal-body" id="menu-items"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
