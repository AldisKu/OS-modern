<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OrderSprinter Modern</title>
  <link rel="stylesheet" href="./styles.37.css?v=37" />
</head>
<body>
  <div id="app">
    <section class="login-screen" id="login-screen">
      <div class="login-card">
        <h1>Login</h1>
        <label>
          <span>Benutzer</span>
          <select id="login-user"></select>
        </label>
        <label>
          <span>Passwort</span>
          <input type="password" id="login-pass" autocomplete="off" />
        </label>
        <div class="keyboard" id="keyboard"></div>
        <div class="login-actions">
          <button class="primary" id="login-btn">Login</button>
          <button class="ghost" id="login-clear">Löschen</button>
        </div>
        <div class="login-hint" id="login-hint"></div>
      </div>
    </section>

    <section class="app-screen hidden" id="start-screen">
      <div class="order-layout">
        <div class="order-left">
          <div class="order-top">
            <div class="order-status" id="start-info-bar">
              <span>Kellner: <b id="status-user">-</b></span>
              <span>Broker: <b id="status-broker">-</b></span>
              <span>Display: <b id="status-display">-</b></span>
              <span>Online: <b id="status-online">-</b></span>
              <span>Sync: <b id="status-sync">-</b></span>
              <span>v: <b id="status-version">-</b></span>
              
            </div>
            <div class="order-top-row">
              <div class="order-menu">
                <div class="order-menu-left">
                  <button class="menu-btn" data-action="to-go">To Go</button>
                  <button class="menu-btn" data-action="paydesk">Kasse</button>
                </div>
                <div class="order-menu-right">
                  <button class="menu-btn menu-btn-right" data-action="menu">Menü</button>
                  <button class="menu-btn" data-action="logout">Logout</button>
                </div>
              </div>
            </div>
          </div>
          <div class="order-bottom">
            <div id="tables-grid" class="tables-grid"></div>
          </div>
        </div>
        <div class="order-right" id="start-right">
          <div class="start-message" id="start-message">
            <div class="start-message-title">Status</div>
            <div class="start-message-body" id="start-message-body">Bereit.</div>
          </div>
        </div>
      </div>
    </section>

    <section class="app-screen hidden" id="order-screen">
      <div class="order-layout">
        <div class="order-left">
          <div class="order-top">
            <div class="order-status" id="order-info-bar">
              <span>Kellner: <b id="order-user">-</b></span>
              <span>Broker: <b id="order-broker">-</b></span>
              <span>Online: <b id="order-online">-</b></span>
              <span>Sync: <b id="order-sync">-</b></span>
              <span>v: <b id="order-version">-</b></span>
              
            </div>
            <div class="order-top-row">
              <div class="order-title"><span id="order-table-label">Tisch</span></div>
              <div class="order-menu">
                <div class="order-menu-left">
                  <button class="menu-btn" data-action="start">Start</button>
                  <button class="menu-btn" data-action="paydesk">Kasse</button>
                  <button class="menu-btn" data-action="workprint">Arbeitsbon</button>
                  <button class="menu-btn" data-action="send">Bestellung beenden</button>
                  <button class="menu-btn" data-action="changetable">Tisch wechseln</button>
                </div>
                <div class="order-menu-right">
                  <button class="menu-btn menu-btn-right" data-action="menu">Menü</button>
                  <button class="menu-btn" data-action="logout">Logout</button>
                </div>
              </div>
            </div>
          </div>
          <div class="order-bottom">
            <div class="category-row" id="category-row"></div>
            <div class="products-grid" id="products-grid"></div>
          </div>
        </div>
        <div class="order-right" id="order-right">
          <div class="order-cart-sum" id="order-cart-sum">Summe: 0.00 €</div>
          <div id="order-items"></div>
        </div>
      </div>
    </section>

    <section class="app-screen hidden" id="paydesk-screen">
      <div class="paydesk-grid">
        <div class="paydesk-ol">
          <div class="paydesk-header-left">
            <span class="paydesk-title">Kasse</span>
            <button class="menu-btn" data-action="start">Start</button>
            <button class="menu-btn" data-action="order">Bestellung</button>
          </div>
          <div class="paydesk-header-right">
            <button class="menu-btn" data-action="menu">Menü</button>
          </div>
          <div class="paydesk-table-name" id="paydesk-table-name">Tisch</div>
        </div>
        <div class="paydesk-or">
          <button class="menu-btn" id="paydesk-table-label">Tisch</button>
        </div>
        <div class="paydesk-url">
          <div class="paydesk-col-head">
            <span id="paydesk-open-title">Tisch</span>
            <button class="ghost" id="paydesk-add-all">+alles</button>
          </div>
          <div id="paydesk-open"></div>
        </div>
        <div class="paydesk-urr">
          <div class="paydesk-col-head">
            <span>Bon</span>
            <div class="paydesk-col-actions">
              <span>Summe: <b id="paydesk-total">0.00</b></span>
              <button class="ghost" id="paydesk-clear-receipt">-alles</button>
            </div>
          </div>
          <div id="paydesk-receipt"></div>
        </div>
        <div class="paydesk-ur">
          <button class="toggle-btn" id="paydesk-host">Bewirtungsbeleg</button>
          <div class="paydesk-side-payments" id="paydesk-payments"></div>
        </div>
      </div>
    </section>

    <div class="modal hidden" id="product-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Produkt</h2>
        </div>
        <div class="modal-body">
          <div class="modal-extras">
            <div id="modal-extras"></div>
          </div>
          <div class="modal-note-section">
            <label><b>Bemerkung</b></label>
            <div id="modal-note"></div>
          </div>
        </div>
        <div class="modal-footer fullwidth">
          <button class="primary" id="modal-add">Bestellen</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="price-modal">
      <div class="modal-content price-modal-content">
        <div class="modal-header">
          <h2 id="price-title">Preis</h2>
        </div>
        <div class="modal-body">
          <div class="price-row">
            <div class="price-label">Preis</div>
            <div class="price-value" id="price-value">0.00</div>
          </div>
          <div class="price-keypad" id="price-keypad">
            <div class="keyboard-row">
              <button type="button" onclick="priceKeyPress('1')">1</button>
              <button type="button" onclick="priceKeyPress('2')">2</button>
              <button type="button" onclick="priceKeyPress('3')">3</button>
            </div>
            <div class="keyboard-row">
              <button type="button" onclick="priceKeyPress('4')">4</button>
              <button type="button" onclick="priceKeyPress('5')">5</button>
              <button type="button" onclick="priceKeyPress('6')">6</button>
            </div>
            <div class="keyboard-row">
              <button type="button" onclick="priceKeyPress('7')">7</button>
              <button type="button" onclick="priceKeyPress('8')">8</button>
              <button type="button" onclick="priceKeyPress('9')">9</button>
            </div>
            <div class="keyboard-row">
              <button type="button" onclick="priceKeyPress('0')">0</button>
              <button type="button" onclick="priceKeyPress(',')">,</button>
              <button type="button" onclick="priceKeyPress('-')">-</button>
            </div>
            <div class="keyboard-row">
              <button type="button" class="key-wide" onclick="priceKeyPress('Back')">Back</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="ghost" id="price-cancel">Abbrechen</button>
          <button class="primary" id="price-confirm">Bestellen</button>
        </div>
      </div>
    </div>

    <div class="modal hidden" id="confirm-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="confirm-title">Bestellung offen</h2>
        </div>
        <div class="modal-body" id="confirm-body"></div>
        <div class="modal-footer" id="confirm-actions"></div>
      </div>
    </div>

    <div class="modal hidden" id="menu-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Menü</h2>
          <button class="ghost" id="menu-close">Schließen</button>
        </div>
        <div class="modal-body" id="menu-items"></div>
      </div>
    </div>
    <div class="modal hidden" id="records-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="records-title">Tischprotokoll</h2>
          <button class="ghost" id="records-close">Schließen</button>
        </div>
        <div class="modal-body records-body" id="records-body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.37.js?v=37"></script>
</body>
</html>
