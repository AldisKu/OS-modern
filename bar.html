 <link rel="stylesheet" type="text/css" href="css/bestformat.css?v=2.9.12">
 
	<link rel="stylesheet" href="php/contenthandler.php?module=admin&command=getmobilecss" />

   <link rel="stylesheet" href="php/3rdparty/jquery.mobile-1.4.0.min.css" type="text/css" />
   <script src="php/3rdparty/jquery-2.2.4.min.js"></script>
   <script src="php/3rdparty/jquery.mobile-1.4.0.min.js"></script>

<style>

#tableWithEntriesToCook,#tableWithCookedEntries,#headertableToCook
{
	width:100%;
}

#declareready,#declarenotcooked {
	text-align:center;
	vertical-align:middle;
}

#readybutton,#notreadybutton {
	width:90%;
}

#optiontext
{
	font-family:sans-serif;
	font-size:10pt;
	color:black;
}

#tableWithCookedEntries td {
	background:#b4b4ec
}

.dividerline {
	height: 10px;
}
</style>

</head>

<body>

<script>

var lang = 0;

var BAR_WORKPRINTERLABEL = ['Bar','Bar','Bar'];

function setLanguage(language,cat1viewname,cat2viewname) {
	lang = language;
        $("#moduleheadline").html(cat2viewname);
        setWorkPrinterLabel(BAR_WORKPRINTERLABEL[lang]);
}

// refreshing the content
$(document).ready(function() {
var refreshId = setInterval(function() {
	getAndDisplayAllEntries();
 }, 5000);
 $.ajaxSetup({ cache: false });
});

function getEntriesToCook() {
    var workprinter = currentworkPrinter;
	// Drinks
	var data = { kind: 1, workprinter: workprinter };
        perfStartTimeGetEntriesToCook = new Date().getTime();
	doAjax("GET","php/contenthandler.php?module=queue&command=getJsonAllQueueItemsToMake",data,fillTableWithEntriesToCook,"no entries to make");
}

function getCookedEntries() {
    var workprinter = currentworkPrinter;
	var data = { kind: 1, workprinter: workprinter };
        perfStartTimeGetCookedEntries = new Date().getTime();
	doAjax("GET","php/contenthandler.php?module=queue&command=getJsonLastMadeItems",data,fillTableWithCookedEntries,"no cooked entries");
}


function hideElementsForNonBarUser(jsonAnswer) {
	if (jsonAnswer != "Yes") {
		$("#allpagecontent").hide();
	}
}

//pageinit event for first page
//triggers only once
//write all your on-load functions and event handlers pertaining to page1
$(document).on("pageinit", "#bar-page", function () {
	var urlsuffix = location.search;
	setWorkMode(urlsuffix);
	
	getGeneralConfigItems();
        setWorkPrinter(0);
        bindWorkPrinterChanged();
});

// REM* called by kitchenbar -> but this is dependent on kitchen or bar
function enableWorkPrinterSelectionOnDemand() {
    if (showbarsel == 1) {
        $("#workprinterselection").show();
    } else {
        $("#workprinterselection").hide();
    }
}

function initializeEverything() {
	hideMenu();
	doAjax("GET","php/contenthandler.php?module=admin&command=isLoggedinUserBar",null,hideElementsForNonBarUser,"Fehler");
}

</script>

<div id="alertoverlay" onclick="alertoff();" >
  <div id="alerttext" style="margin:20px;padding:50px;"></div>
</div>


<!--first page -->
<div data-role="page" id="bar-page" data-theme="c">
	<div data-role="panel" id="modulepanel" data-position="right" data-display="overlay">
        <ul data-role="listview" id="modulemenu" data-divider-theme="a" data-inset="true">
            <li data-role="list-divider" data-theme="b" data-role="heading">Hauptmenü</li>
        </ul>
    </div><!-- /panel -->
    <div data-role="header" data-theme="b" data-position="fixed" id="headerline" style="background-color:black;">
            <h1><span id="moduleheadline">Bar</span> <img src="img/connection.png" class="connectionstatus" style="display:none;" /> <img src="img/printerstatus.png" class="printerstatus" style="display:none;" /> <img src="img/tsestatus.png" class="tsestatus" style="display:none;" /> <img src="img/tasksstatus.png" class="tasksstatus" style="display:none;" /></h1>
		 <div data-type="horizontal" style="top:0px;position:absolute;float:right;z-index:10;display:inline;" align="right" class="ui-btn-right"> 
			<a href="#" data-role="button" data-icon="arrow-d" data-ajax="false" id="menuswitch">Hauptmenü</a> 
		 </div>
    </div>
    <div data-role="content" id="allpagecontent">    
        
        <div id='workprinterselection' class="ui-grid-c" style='display:none;'>
            <div class="ui-block-a"><div id="workprinter_1" class="workprinter ui-bar ui-bar-a" style="height:40px"><span class='workprinterlabel'>B</span> 1</div></div>
            <div class="ui-block-b"><div id="workprinter_2" class="workprinter ui-bar ui-bar-a" style="height:40px"><span class='workprinterlabel'>B</span> 2</div></div>
            <div class="ui-block-c"><div id="workprinter_3" class="workprinter ui-bar ui-bar-a" style="height:40px"><span class='workprinterlabel'>B</span> 3</div></div>
            <div class="ui-block-d"><div id="workprinter_4" class="workprinter ui-bar ui-bar-a" style="height:40px"><span class='workprinterlabel'>B</span> 4</div></div>
        </div><!-- /grid-c -->
        
        
    	<div id=listWithEntriesToCook></div>
    	<hr id="hrline">
    	<div id=listWithCookedEntries></div>
	</div>
	<div data-role="footer" data-theme="b" id="thefooterr" style="background-color:black;"> 
		<div class="ui-grid-a">
			<div class="ui-block-a userinfo"><span id="loggedinuser"></span></div>
			<div class="ui-block-b grid_right" id="versioninfo"></div>
		</div><!-- /grid-a -->
	</div> <!--  footer  -->
</div>
</body>
</html>
